version: "3.9"

services:

  # ---------------------------------------------------------------
  # Base de données MongoDB
  # ---------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: medapp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: medapp
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # Interface d'administration MongoDB (utile pour visualiser les données)
  # ---------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0
    container_name: medapp-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy

  # ---------------------------------------------------------------
  # Backend Spring Boot (API RESTful)
  # ---------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medapp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/medapp
    volumes:
      - ./backend/src:/app/src          # hot-reload du code source (Spring DevTools)
      - ./backend/pom.xml:/app/pom.xml
      - maven_repo:/root/.m2            # cache des dépendances Maven entre redémarrages
    depends_on:
      mongodb:
        condition: service_healthy

  # ---------------------------------------------------------------
  # Frontend Vue.js (serveur de développement Vite)
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medapp-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    volumes:
      - ./frontend:/app
      - /app/node_modules                # évite d'écraser node_modules du conteneur
    depends_on:
      - backend

volumes:
  mongo_data:
  maven_repo:
